{% extends "admin/base.html" %}

{% block content %}
<h1>Meetings</h1>
<a href="{% url 'meeting_create' %}" class="btn btn-primary">Create Meeting</a>
<table class="table">
    <thead>
        <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Owner</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for meeting in meetings %}
        <tr>
            <td>{{ meeting.title }}</td>
            <td>{{ meeting.date }}</td>
            <td>{{ meeting.owner }}</td>
            <td>
                <a href="{% url 'meeting_detail' meeting.pk %}">View</a>
                <a href="{% url 'meeting_update' meeting.pk %}">Edit</a>
                <a href="{% url 'meeting_delete' meeting.pk %}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
